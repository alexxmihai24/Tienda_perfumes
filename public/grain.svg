<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" width="256" height="256">
  <filter id="grain-filter" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="linearRGB">
    <feTurbulence
      type="fractalNoise"
      baseFrequency="0.85"
      numOctaves="4"
      seed="2"
      stitchTiles="stitch"
      result="noise"
    />
    <feColorMatrix
      type="saturate"
      values="0"
      in="noise"
      result="grayscale-noise"
    />
  </filter>
  <rect width="100%" height="100%" filter="url(#grain-filter)" opacity="1" />
</svg>
